<svg viewBox="0 0 1000 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <rect x="0" y="14" width="1000" height="2" fill="#313244"/>
  <rect x="0" y="15" width="1000" height="1" fill="#89b4fa" opacity="0.5"/>

  <g fill="#f5f7ff" opacity="0.9">
    <g>
      <animateTransform attributeName="transform" type="translate" values="-60,0; 1060,0" dur="20s" repeatCount="indefinite"/>
      <rect x="0" y="6" width="8" height="4"/>
      <rect x="8" y="2" width="8" height="8"/>
      <rect x="16" y="6" width="8" height="4"/>
    </g>
  </g>
  <g fill="#f5f7ff" opacity="0.6">
    <g>
      <animateTransform attributeName="transform" type="translate" values="-40,0; 1040,0" dur="15s" begin="-5s" repeatCount="indefinite"/>
      <rect x="0" y="20" width="6" height="3"/>
      <rect x="6" y="17" width="6" height="6"/>
      <rect x="12" y="20" width="6" height="3"/>
    </g>
  </g>
  <g fill="#cba6f7" opacity="0.5">
    <g>
      <animateTransform attributeName="transform" type="translate" values="-30,0; 1030,0" dur="26s" begin="-10s" repeatCount="indefinite"/>
      <rect x="0" y="10" width="5" height="3"/>
      <rect x="5" y="7" width="5" height="5"/>
    </g>
  </g>
</svg>
